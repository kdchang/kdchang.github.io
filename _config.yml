# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: KD Chang
subtitle: 經營一家名為人生公司的學習筆記 | Learning notes on Life Inc.
author: 張凱迪（KD Chang）
language: zh-TW
timezone: Asia/Taipei

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://www.kdchang.cc
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: false # Set to false to remove trailing '.html' from permalinks

#Custom Setting Start

# Site settings
SEOTitle: KD Chang
header-img: img/cover.jpg
email: kdchang.cc@gmail.com
description: "記錄一個軟體工程師也是一位創業者和教育工作者對教育學習、媒體出版、產品設計、創新創業、經營管理、政治經濟與職場人生的思考與觀察"
keyword: "教育學習, 媒體出版, 產品設計, 創新創業, 經營管理, 政治經濟, 職場人生, 軟體工程師"


# SNS settings
# RSS: false
# weibo_username:     Demonbane
# zhihu_username:     Demonbane
github_username:    kdchang
twitter_username:   kaidichang
facebook_username:  kdchang.cc
# linkedin_username:  kaijun-chen-42089354

# Build settings
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`

# Disqus settings
disqus_username: kdchang-blog

# Analytics settings
# Baidu Analytics
# ba_track_id: 4cc1f2d8f3067386cc5cdb626a202900
# Google Analytics
ga_track_id: 'UA-47712654-1'            # Format: UA-xxxxxx-xx
ga_domain: www.kdchang.cc


# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "文藝型開發者，夢想是做出人們想用的產品和辦一所心目中理想的學校。A Starter, Software Engineer & Maker. JavaScript, Python & Arduino/Android lover.:)
"
sidebar-avatar: /img/avatar.jpg      # use absolute URL, seeing it's used in both `/` and `/about/`


# Featured Tags
featured-tags: false                     # whether or not using Feature-Tags
featured-condition-size: 1              # A tag will be featured if the size of it is more than this condition value


# Friends
friends: [
    {
        title: "TechBridge Weekly 技術週刊",
        href: "http://weekly.techbridge.cc/"
    }, {
        title: "TechBridge Blog",
        href: "http://blog.techbridge.cc/"
    }
]


#Custom Setting End



# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: "archives"
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: false
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: web
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page


## Google Analytics
google_analytics:
  enable: true
  id: UA-47712654-1
  site: auto

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: huxblog
plugins:
  hexo-generator-cname
  hexo-generator-robotstxt

## social
addthis:
  enable: true
  pubid:
  facebook: true
  twitter: true
  google: true
  pinterest: true

## robots.txt
robotstxt:
  useragent: "*"
  disallow:
    - ''
  sitemap: 
    - https://www.kdchang.cc/sitemap.xml
  baidusitemap: 
    - /baidusitemap.xml

## category
category_generator:
  per_page: 10

## archive
archive_generator:
  per_page: 10
  yearly: true
  monthly: true
  daily: false

## Search 
search:
  path: search.xml
  field: post

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  # repo: https://github.com/ReadThinker/readthinker.github.io
  repo: git@github.com:kdchang/kdchang.github.io.git
  # example, https://github.com/hexojs/hexojs.github.io
  branch: gh-pages

# hexo sitemap
sitemap:
  path: sitemap.xml
baidusitemap:
  path: baidusitemap.xml

feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: logo.png
  autodiscovery: true
  template:
